name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by chat-api after admin saves schedule (event_type: content_updated).
  repository_dispatch:
    types: [content_updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch admin-edited content
        # Best-effort: failure does not fail the build. The committed
        # data/schedule.json (or DEFAULT_SCHEDULE in lib/mochi.ts) is the fallback.
        run: pnpm fetch:content
        env:
          CHAT_API_BASE: https://chat.latent-bridge.com
          SITE_ID: kotaruru0603

      - name: Build
        run: pnpm build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Add CNAME
        run: echo kotaruru0603.latent-bridge.com > out/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
